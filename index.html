<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>KBB Vaka Takip</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
        :root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
        html,body{height:100%;overflow:hidden;background:#0f172a;color:#fff;touch-action:manipulation}
        .app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
        .header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(15,23,42,.95);border-bottom:1px solid #334155;flex-shrink:0}
        .header-left{display:flex;align-items:center;gap:8px}
        .logo{width:32px;height:32px;border-radius:8px}
        .header h1{font-size:14px;font-weight:700}
        .header small{font-size:9px;color:#64748b}
        .badge{background:#1e293b;padding:4px 10px;border-radius:8px;font-size:11px;color:#94a3b8}
        .badge b{font-size:16px;color:#fff;margin-right:3px}
        .lock-btn{background:0 0;border:none;color:#94a3b8;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
        .lock-btn.locked{color:#f59e0b;background:rgba(245,158,11,.2)}
        .main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
        .section{padding:10px}
        .card{background:#1e293b;border-radius:14px;margin-bottom:10px;border:1px solid #334155;overflow:hidden}
        .card-head{padding:10px 12px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600}
        .card-hint{font-size:8px;color:#64748b}

        /* Kıdem Grubu */
        .kidem-group{margin-bottom:8px}
        .kidem-label{font-size:10px;color:#64748b;padding:4px 12px;background:rgba(51,65,85,.3);border-bottom:1px solid #334155}
        .kidem-divider{height:8px;background:linear-gradient(to bottom,#0f172a,transparent)}

        /* Table */
        .tbl-wrap{overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-height:calc(100vh - 220px);position:relative}
        table{width:100%;border-collapse:separate;border-spacing:2px;padding:6px}
        thead{position:sticky;top:0;z-index:10}
        th{font-size:8px;font-weight:600;color:#94a3b8;padding:4px 1px;text-align:center;white-space:nowrap;cursor:grab;background:#1e293b}
        th:first-child{text-align:left;position:sticky;left:0;background:#1e293b;z-index:12;min-width:60px;cursor:default}
        th:last-child{position:sticky;right:0;background:#3b82f6;color:#fff;border-radius:4px;min-width:32px;cursor:default;z-index:11}
        th.dragging{opacity:0.5;background:#475569}
        th.drag-over{border-bottom:2px solid #3b82f6}
        td{padding:1px;text-align:center}
        td:first-child{position:sticky;left:0;background:#1e293b;z-index:1;text-align:left;padding:2px 4px}
        td:last-child{position:sticky;right:0;background:rgba(59,130,246,.15)}
        .name{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:600;cursor:grab}
        .name.dragging{opacity:0.5}
        .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .drag-handle{color:#475569;font-size:10px;cursor:grab}

        /* Cell */
        .cell{width:40px;height:40px;border:none;border-radius:6px;font-size:13px;font-weight:600;font-family:'SF Mono',Monaco,monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none}
        .cell:active{transform:scale(.9)}
        .c0{background:rgba(51,65,85,.4);color:rgba(148,163,184,.5)}
        .c1{background:rgba(71,85,105,.8);color:#fff}
        .cell.locked{cursor:not-allowed;opacity:0.6}
        .sum{font-size:13px;font-weight:700;color:#60a5fa;font-family:'SF Mono',Monaco,monospace}
        .sum-y{color:#fbbf24}
        .rot th:last-child{background:#f59e0b;z-index:11}
        .rot td:last-child{background:rgba(245,158,11,.15)}

        /* PWA Install Banner */
        .install-banner{display:none;align-items:center;gap:8px;padding:8px 12px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:10px;margin:6px 10px;cursor:pointer;animation:fade .3s ease}
        .install-banner.show{display:flex}
        .install-banner svg{width:20px;height:20px;color:#fff;flex-shrink:0}
        .install-banner-text{flex:1;font-size:11px;color:#fff;font-weight:600}
        .install-banner-close{background:0 0;border:none;color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;padding:0 4px}

        /* Nav */
        .nav{display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,var(--safe-bottom));background:rgba(15,23,42,.95);border-top:1px solid #334155;flex-shrink:0}
        .nav-btn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 12px;background:0 0;border:none;border-radius:10px;color:#64748b;cursor:pointer}
        .nav-btn.on{color:#3b82f6}
        .nav-btn svg{width:20px;height:20px}
        .nav-btn span{font-size:8px;font-weight:600}
        .tab{display:none}.tab.on{display:block}

        /* Quick buttons */
        .quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px}
        .quick-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;border-radius:8px;border:2px solid;background:0 0;cursor:pointer}
        .quick-btn:active{transform:scale(.95)}
        .quick-btn svg{width:12px;height:12px}
        .quick-btn span{font-size:8px;font-weight:700}

        /* Sıralama */
        .sira{display:flex;align-items:center;gap:8px;padding:10px;margin:6px 10px;border-radius:10px;background:rgba(51,65,85,.3)}
        .sira.top{background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(16,185,129,.1));border:1px solid rgba(34,197,94,.4)}
        .rank{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#475569;color:#94a3b8}
        .sira.top .rank{background:#22c55e;color:#fff}
        .sira-info{flex:1}
        .sira-name{font-size:13px;font-weight:700}
        .sira-stat{font-size:9px;color:#64748b}
        .sira-badge{background:#22c55e;color:#fff;padding:3px 6px;border-radius:4px;font-size:8px;font-weight:700}
        .sira-score{font-family:monospace;font-size:10px;color:#64748b}

        /* Settings */
        .set-sec{padding:10px}
        .set-list{display:flex;flex-wrap:wrap;gap:4px}
        .set-item{display:flex;align-items:center;gap:4px;background:rgba(51,65,85,.5);padding:4px 8px;border-radius:6px;font-size:10px;cursor:grab}
        .set-item.dragging{opacity:0.5}
        .set-item button{background:0 0;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:0}
        .add-btn{color:#3b82f6;font-size:10px;font-weight:600;background:0 0;border:none;cursor:pointer}
        .export-btns{display:flex;gap:6px;margin-bottom:10px}
        .export-btns button{flex:1;padding:12px;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
        .pdf-btn{background:linear-gradient(135deg,#ef4444,#ec4899)}
        .doc-btn{background:linear-gradient(135deg,#3b82f6,#06b6d4)}
        .pdf-btn:active,.doc-btn:active{transform:scale(0.98)}
        .reset-btn{width:100%;padding:10px;background:0 0;border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#ef4444;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
        .footer{text-align:center;padding:16px;color:#475569;font-size:9px}
        .footer svg{width:36px;height:36px;margin-bottom:6px}

        /* Modal */
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100}
        .modal-bg.show{display:flex}
        .modal{width:100%;max-width:500px;background:#1e293b;border-radius:16px 16px 0 0;max-height:75vh;overflow:hidden;animation:up .25s ease}
        @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #334155}
        .modal-title{font-size:15px;font-weight:700}
        .modal-close{background:0 0;border:none;color:#94a3b8;cursor:pointer}
        .modal-body{padding:14px;overflow-y:auto;max-height:55vh}
        .fg{margin-bottom:12px}
        .fl{display:block;font-size:11px;color:#94a3b8;margin-bottom:4px}
        .fi,.fs{width:100%;padding:10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
        .fcheck{display:flex;align-items:center;gap:8px;padding:12px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px}
        .fcheck input{width:16px;height:16px;accent-color:#f59e0b}
        .fcheck span{font-size:13px;font-weight:500}
        .fsubmit{width:100%;padding:12px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
        .colors{display:flex;gap:6px;flex-wrap:wrap}
        .cbtn{width:32px;height:32px;border-radius:8px;border:2px solid transparent;cursor:pointer}
        .cbtn.sel{border-color:#fff;transform:scale(1.1)}

        /* Toast */
        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 16px;border-radius:16px;font-size:12px;font-weight:600;z-index:200;display:none}
        .toast.show{display:block;animation:fade .2s ease}
        .toast.warn{background:#f59e0b}
        .toast.err{background:#ef4444}
        @keyframes fade{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        /* Drag placeholder */
        .drag-placeholder{background:rgba(59,130,246,.2);border:2px dashed #3b82f6;border-radius:6px}
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-left">
            <svg class="logo" viewBox="0 0 512 512"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><rect width="512" height="512" rx="120" fill="url(#g)"/><g fill="#fff"><ellipse cx="145" cy="200" rx="55" ry="80"/><ellipse cx="256" cy="170" rx="40" ry="70"/><path d="M256 240v100" stroke="#fff" stroke-width="25"/><circle cx="256" cy="380" r="40"/><path d="M320 180l50-40h60v200q-60 40-110-20v-20h40v-120z"/></g></svg>
            <div><h1>KBB Vaka Takip</h1><small>💾 Otomatik kayıt</small></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <button class="lock-btn" id="lockbtn" onclick="toggleLock()" title="Düzenleme Kilidi">🔓</button>
            <div class="badge"><b id="tot">0</b>vaka</div>
        </div>
    </header>

    <main class="main">
        <!-- PWA Install Banner -->
        <div class="install-banner" id="installBanner" onclick="installPWA()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span class="install-banner-text">Uygulamayı telefonuna indir!</span>
            <button class="install-banner-close" onclick="event.stopPropagation();document.getElementById('installBanner').classList.remove('show')">×</button>
        </div>

        <!-- VAKA TAB -->
        <div id="t1" class="tab on">
            <div class="section">
                <div class="card">
                    <div class="card-head"><span>👆 Hızlı Vaka Ekle</span></div>
                    <div class="quick-grid" id="qb"></div>
                </div>
                <div class="card">
                    <div class="card-head"><span>📊 Vaka Tablosu</span><span class="card-hint">Dokun +1 | Basılı tut -1</span></div>
                    <div class="tbl-wrap"><table id="vtbl"></table></div>
                </div>
            </div>
        </div>

        <!-- POLİKLİNİK TAB -->
        <div id="t2" class="tab">
            <div class="section">
                <div class="card">
                    <div class="card-head"><span>📍 Dış Merkez / Rotasyon</span><span class="card-hint">Dokun +1 | Basılı tut -1</span></div>
                    <div class="tbl-wrap"><table id="rtbl" class="rot"></table></div>
                </div>
            </div>
        </div>

        <!-- SIRALAMA TAB -->
        <div id="t3" class="tab">
            <div class="section">
                <div class="card">
                    <div class="card-head"><span>🏆 Adil Sıralama</span><span class="card-hint">Az vaka + çok rotasyon = öncelik</span></div>
                    <div id="slist"></div>
                </div>
            </div>
        </div>

        <!-- AYARLAR TAB -->
        <div id="t4" class="tab">
            <div class="section">
                <div class="export-btns">
                    <button class="pdf-btn" onclick="generatePDF()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        PDF İndir
                    </button>
                    <button class="doc-btn" onclick="generateDOCX()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Word İndir
                    </button>
                </div>
                <div class="card">
                    <div class="card-head"><span>👤 Asistanlar</span><button class="add-btn" onclick="modal('a')">+ Ekle</button></div>
                    <div class="set-sec"><div class="set-list" id="alist"></div></div>
                </div>
                <div class="card">
                    <div class="card-head"><span>🔪 Ameliyatlar</span><button class="add-btn" onclick="modal('m')">+ Ekle</button></div>
                    <div class="set-sec"><div class="set-list" id="mlist"></div></div>
                </div>
                <div class="card">
                    <div class="card-head"><span>📍 Dış Merkezler</span><button class="add-btn" onclick="modal('d')">+ Ekle</button></div>
                    <div class="set-sec"><div class="set-list" id="dlist"></div></div>
                </div>
                <div class="set-sec">
                    <button class="reset-btn" onclick="resetData()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Verileri Sıfırla</button>
                </div>
                <div class="footer">
                    <svg viewBox="0 0 512 512"><defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><rect width="512" height="512" rx="120" fill="url(#g2)"/><g fill="#fff"><ellipse cx="145" cy="200" rx="55" ry="80"/><ellipse cx="256" cy="170" rx="40" ry="70"/><path d="M256 240v100" stroke="#fff" stroke-width="25"/><circle cx="256" cy="380" r="40"/><path d="M320 180l50-40h60v200q-60 40-110-20v-20h40v-120z"/></g></svg>
                    <div>KBB Vaka Takip v5.0</div>
                </div>
            </div>
        </div>
    </main>

    <nav class="nav">
        <button class="nav-btn on" onclick="tab(0)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg><span>Vaka</span></button>
        <button class="nav-btn" onclick="tab(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>Poliklinik</span></button>
        <button class="nav-btn" onclick="tab(2)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M18 2H6v7a6 6 0 0012 0V2z"/></svg><span>Sıralama</span></button>
        <button class="nav-btn" onclick="tab(3)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Ayarlar</span></button>
    </nav>
</div>

<div class="modal-bg" id="mbg" onclick="cmodal()">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head"><span class="modal-title" id="mtitle"></span><button class="modal-close" onclick="cmodal()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="modal-body" id="mbody"></div>
    </div>
</div>
<div class="toast" id="toast"></div>

function gv(a,m){return V[a+'_'+m]||0}
function tv(a){return Object.keys(V).filter(k=>k.startsWith(a+'_')).reduce((s,k)=>s+V[k],0)}
function gr(a,d){return R[a+'_'+d]||0}
function tr(a){return Object.keys(R).filter(k=>k.startsWith(a+'_')).reduce((s,k)=>s+R[k],0)}
function gt(){return Object.values(V).reduce((a,b)=>a+b,0)}
function hp(){try{navigator.vibrate&&navigator.vibrate(10)}catch(e){}}

function uc(a,m){

    if(c){const v=gv(a,m);c.textContent=v||'·';c.className='cell '+(v?'c1':'c0')+(LOCKED?' locked':'')}
    const row=c?.closest('tr');
    if(row){const s=row.querySelector('.sum');if(s)s.textContent=tv(a)}
    document.getElementById('tot').textContent=gt();
    sv();
}

function ur(a,d){
    const c=document.querySelector('[data-a="'+a+'"][data-d="'+d+'"]');
    if(c){const v=gr(a,d);c.textContent=v||'·';c.className='cell '+(v?'c1':'c0')+(LOCKED?' locked':'')}
    const row=c?.closest('tr');
    if(row){const s=row.querySelector('.sum');if(s)s.textContent=tr(a)}
    sv();
}

function pv(a,m){if(LOCKED)return;hp();V[a+'_'+m]=(V[a+'_'+m]||0)+1;uc(a,m)}
function mv(a,m){if(LOCKED)return;const k=a+'_'+m;if(V[k]>0){hp();V[k]--;uc(a,m)}}
function pr(a,d){if(LOCKED)return;hp();R[a+'_'+d]=(R[a+'_'+d]||0)+1;ur(a,d)}
function mr(a,d){if(LOCKED)return;const k=a+'_'+d;if(R[k]>0){hp();R[k]--;ur(a,d)}}

// Cell Events
function bindCells(tid,type){
    document.querySelectorAll('#'+tid+' .cell').forEach(c=>{
        let timer=null,startX=0,startY=0,moved=false,validTap=false;
        c.addEventListener('pointerdown',e=>{
            e.preventDefault();e.stopPropagation();
            c.setPointerCapture(e.pointerId);
            startX=e.clientX;startY=e.clientY;moved=false;validTap=false;
            timer=setTimeout(()=>{
                if(!moved){
                    validTap=true;
                    if(type==='m')mv(c.dataset.a,c.dataset.m);
                    else mr(c.dataset.a,c.dataset.d);
                }
                timer=null;
            },50);
        },{passive:false});
        c.addEventListener('pointermove',e=>{
            if(Math.abs(e.clientX-startX)>15||Math.abs(e.clientY-startY)>15)moved=true;
        });
        c.addEventListener('pointerup',e=>{
            e.preventDefault();e.stopPropagation();
            if(timer&&!moved&&validTap){
                clearTimeout(timer);timer=null;
                if(type==='m')pv(c.dataset.a,c.dataset.m);
                else pr(c.dataset.a,c.dataset.d);
            }else if(timer){
                clearTimeout(timer);timer=null;
            }
        },{passive:false});
        c.addEventListener('pointercancel',()=>{if(timer){clearTimeout(timer);timer=null}});
        c.addEventListener('pointerleave',()=>{if(timer){clearTimeout(timer);timer=null}});
    });
}

// Drag & Drop Asistan
function bindDragAsistan(tid){
    let dragIdx = null;
    document.querySelectorAll('#'+tid+' .name[draggable="true"]').forEach(el=>{
        el.addEventListener('dragstart',e=>{
            dragIdx = parseInt(el.dataset.aidx);
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed='move';
        });
        el.addEventListener('dragend',()=>{
            el.classList.remove('dragging');
            dragIdx=null;
        });
        el.addEventListener('dragover',e=>{
            e.preventDefault();
            e.dataTransfer.dropEffect='move';
        });
        el.addEventListener('drop',e=>{
            e.preventDefault();
            const dropIdx = parseInt(el.dataset.aidx);
            if(dragIdx!==null && dragIdx!==dropIdx){
                const item = A.splice(dragIdx,1)[0];
                A.splice(dropIdx,0,item);
                sv();rvt();rrt();rq();
                toast('Sıra değiştirildi');
            }
        });
    });
}

}

}

        const rh=['ASISTAN'].concat(DM.map(d=>trChar(d.ad)),['TOP']);
        const rd=A.map(a=>[trChar(a.ad)].concat(DM.map(d=>gr(a.id,d.id)||'-'),[tr(a.id)]));
        doc.autoTable({startY:ry,head:[rh],body:rd,theme:'grid',headStyles:{fillColor:[245,158,11],fontSize:7},bodyStyles:{fontSize:8,halign:'center'},columnStyles:{0:{halign:'left',fontStyle:'bold'}},margin:{left:5},tableWidth:140});

        doc.save('KBB_'+new Date().toISOString().split('T')[0]+'.pdf');
        toast('PDF indirildi!');
    }catch(e){console.error(e);toast('PDF hatası','err')}
}

        html+='</tbody></table>';

        A.forEach(a=>{
            html+='<tr><td>'+a.ad+'</td>';
            DM.forEach(d=>html+='<td>'+(gr(a.id,d.id)||'-')+'</td>');
            html+='<td style="background:#fef3c7;font-weight:bold">'+tr(a.id)+'</td></tr>';

        html+='</tbody></table></body></html>';

// PWA Install
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    document.getElementById('installBanner').classList.add('show');
});
function installPWA(){
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r=>{
        if(r.outcome==='accepted')toast('Uygulama yüklendi!');
        deferredPrompt=null;
        document.getElementById('installBanner').classList.remove('show');
    });
}
window.addEventListener('appinstalled',()=>{
    document.getElementById('installBanner').classList.remove('show');
    toast('Uygulama yüklendi!');
});

// Service Worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW OK')).catch(e=>console.log('SW fail',e));
}

// iOS PWA Detection - show manual install hint
if(navigator.standalone===false || (navigator.userAgent.match(/iPhone|iPad/) && !window.navigator.standalone)){
    const dismissed=localStorage.getItem('kbb_ios_dismiss');
    if(!dismissed){
        const banner=document.getElementById('installBanner');
        banner.querySelector('.install-banner-text').textContent='Safari > Paylaş > Ana Ekrana Ekle ile yükle!';
        banner.onclick=null;
        banner.style.cursor='default';
        banner.classList.add('show');
    }
}

updateLockDisplay();
rq();rvt();rrt();
